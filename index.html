<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Ulang Tahun Linda 💕</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(135deg, #ffd6e8, #ffe5d9);
        overflow: hidden;
        color: #444;
      }

      .page {
        display: none;
        height: 100vh;
        width: 100vw;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        padding: 20px;
        position: absolute;
      }
      .active {
        display: flex;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 34px;
        color: #ff4f9a;
        margin-bottom: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }

      button {
        padding: 12px 28px;
        border: none;
        border-radius: 30px;
        background: #ff4f9a;
        color: white;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }
      button:hover {
        transform: scale(1.05);
      }

      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 70px);
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
      }
      .key {
        background: white;
        border-radius: 50%;
        height: 70px;
        width: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: 0.2s;
      }
      .key:hover {
        transform: scale(1.1);
      }

      .pin-display {
        letter-spacing: 10px;
        font-size: 28px;
        margin-top: 10px;
      }

      /* GAME */
      #gameArea {
        position: relative;
        width: 100%;
        height: 60vh;
        overflow: hidden;
      }

      .heart {
        position: absolute;
        font-size: 30px;
        cursor: pointer;
        animation: drop 3s linear forwards;
      }
      @keyframes drop {
        from {
          top: -10%;
        }
        to {
          top: 110%;
        }
      }

      /* WIN POPUP */
      #winPopup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }
      .win-box {
        background: white;
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        animation: pop 0.4s ease;
      }
      @keyframes pop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* LETTER */
      #letter {
        white-space: pre-line;
        max-width: 600px;
        font-size: 16px;
        margin-top: 15px;
      }

      /* SLIDE */
      .slide {
        display: none;
      }
      .slide img {
        width: 260px;
        height: 360px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .music-card {
        background: white;
        border-radius: 20px;
        padding: 10px;
        margin: 10px;
        width: 320px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 26px;
        }
        .slide img {
          width: 200px;
          height: 280px;
        }
        .music-card {
          width: 95%;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOADING -->
    <div class="page active" id="loading">
      <div class="card">
        <h1 id="loadingText"></h1>
      </div>
    </div>

    <!-- PIN -->
    <div class="page" id="pinPage">
      <div class="card">
        <h1>hayo tebak PIN nya berapa?</h1>
        <div class="pin-display" id="pinDisplay">______</div>
        <div class="keypad">
          <div class="key">1</div>
          <div class="key">2</div>
          <div class="key">3</div>
          <div class="key">4</div>
          <div class="key">5</div>
          <div class="key">6</div>
          <div class="key">7</div>
          <div class="key">8</div>
          <div class="key">9</div>
          <div></div>
          <div class="key">0</div>
          <div></div>
        </div>
        <p id="pinMessage"></p>
      </div>
    </div>

    <!-- GAME -->
    <div class="page" id="gamePage">
      <div class="card">
        <h1>main game dulu gih</h1>
        <p>Score: <span id="score">0</span> / 5</p>
        <div id="gameArea"></div>
      </div>
    </div>

    <!-- WIN POPUP -->
    <div id="winPopup">
      <div class="win-box">
        <h1>yeyy lindaa menang 💕</h1>
        <p>cie kamu dapet hati aku hahaha</p>
        <button onclick="goBirthday()">buka hadiah kamuu 🎁</button>
      </div>
    </div>

    <!-- BIRTHDAY -->
    <div class="page" id="birthdayPage">
      <div class="card">
        <h1>Selamat Ulang Tahun Cintaa 💖</h1>
        <div id="letter"></div>
        <button onclick="nextPage('memoryPage')">Next</button>
      </div>
    </div>

    <!-- MEMORY -->
    <div class="page" id="memoryPage">
      <div class="card">
        <h1>Memori ✨</h1>
        <div class="slide">
          <img
            src="IMG_20260317_165720.jpg"
          />
        </div>
        <div class="slide">
          <img
            src="IMG-20260125-WA0028.jpg"
          />
        </div>
        <div class="slide">
          <img
            src="IMG_20250930_063527.jpg"
          />
        </div>
        <div class="slide">
          <img
            src="IMG_20251110_080623.jpg"
          />
        </div>

        <div id="typing-memory" style="text-align: center; color: white; font-family: sans-serif; margin: 15px 0; min-height: 20px;"></div>
        
        <button onclick="nextPage('musicPage')">Next</button>
      </div>
    </div>

    <!-- MUSIC -->
    <div class="page" id="musicPage">
      <div class="card">
        <h1>Lagu buat kamu 🎶</h1>
        <div class="music-card">
          <iframe
            src="https://open.spotify.com/embed/track/6cgBRhTzwk0OBhRX2E5F3V?si=b2p2NaL9QYuC6PoOG_f55Q&pi=7cRRLw6zTcSwt"
            width="100%"
            height="80"
          ></iframe>
        </div>
        <div class="music-card">
          <iframe
            src="https://open.spotify.com/embed/track/3ymuBMTviroWLuf1jMsMVf?si=il_NlbWZQsuIR6HkcuY3VQ"
            width="100%"
            height="80"
          ></iframe>
        </div>
        <div class="music-card">
          <iframe
            src="https://open.spotify.com/embed/track/1ylY6UrF7cmOZ9GDOxrfk8?si=2y9UF5yZSmis_oowdhZGrQ"
            width="100%"
            height="80"
          ></iframe>
        </div>
      </div>
    </div>

    <script>
      /* PAGE SWITCH */
      function nextPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      /* LOADING */
      let text = "sabar yaa, re lagi nyiapin sesuatu 🥰💌";
      let i = 0;
      function typeLoad() {
        if (i < text.length) {
          document.getElementById("loadingText").innerHTML += text[i];
          i++;
          setTimeout(typeLoad, 50);
        } else {
          setTimeout(() => nextPage("pinPage"), 1200);
        }
      }
      typeLoad();

      /* PIN */
      let input = "";
      document.querySelectorAll(".key").forEach((key) => {
        key.addEventListener("click", () => {
          if (input.length < 6) {
            input += key.innerText;
            document.getElementById("pinDisplay").innerText = input.replace(
              /./g,
              "*",
            );
            if (input.length == 6) {
              if (input === "212609") {
                setTimeout(() => startGame(), 400);
              } else {
                document.getElementById("pinMessage").innerText =
                  "masa gatauu 🥺";
                input = "";
                document.getElementById("pinDisplay").innerText = "____";
              }
            }
          }
        });
      });

      /* GAME */
      let score = 0;
      let target = 5;
      function startGame() {
        nextPage("gamePage");
        score = 0;
        document.getElementById("score").innerText = score;
        spawnHearts();
      }

      function spawnHearts() {
        let gameArea = document.getElementById("gameArea");
        let spawn = setInterval(() => {
          if (
            !document.getElementById("gamePage").classList.contains("active")
          ) {
            clearInterval(spawn);
            return;
          }
          let heart = document.createElement("div");
          heart.classList.add("heart");
          heart.innerHTML = "💗";
          heart.style.left = Math.random() * 90 + "%";
          heart.onclick = function () {
            score++;
            document.getElementById("score").innerText = score;
            heart.remove();
            if (score >= target) {
              clearInterval(spawn);
              document.getElementById("winPopup").style.display = "flex";
            }
          };
          gameArea.appendChild(heart);
          setTimeout(() => heart.remove(), 3000);
        }, 700);
      }

      function goBirthday() {
        document.getElementById("winPopup").style.display = "none";
        nextPage("birthdayPage");
        startLetter();
      }

      /* LETTER */
      let letterText = `Halo lindaa 💕

Happy level up dayy, happy birthday, lindaa! 
I'm really grateful to have you in my life, someone who understands me, supports me, and brings so much joy into my days. 
Cheers to another year of growing, laughing, and being chaotic together hope this year treats you kindly and gives you everything you've been wishing for. 
Enjoy your day, you deserve it!`;
      let j = 0;
      function startLetter() {
        j = 0;
        let area = document.getElementById("letter");
        area.innerHTML = "";
        function type() {
          if (j < letterText.length) {
            area.innerHTML += letterText[j];
            j++;
            setTimeout(type, 35);
          }
        }
        type();
      }

      /* SLIDE */
      let slideIndex = 0;
      function showSlides() {
        let slides = document.querySelectorAll(".slide");
        slides.forEach((s) => (s.style.display = "none"));
        slideIndex++;
        if (slideIndex > slides.length) slideIndex = 1;
        slides[slideIndex - 1].style.display = "block";
        setTimeout(showSlides, 2500);
      }
      showSlides();
    </script>
    <audio src="Bersenja Gurau - Raim Laode Lirik Lagu (1).mp3" autoplay loop id="laguUltah"></audio>

<script>
  // Agar lagu berputar otomatis saat layar disentuh (aturan browser)
  document.body.addEventListener('click', function() {

</script>
    <script>
  const pesanLengkap = "Terimakasih yaa kamu selalu nemenin aku setiap hari, selain tuhan dan orang tua aku, kamu adalah salah satu orang yang menjadi alasan ku untuk hidup, mungkin beberapa kali aku selalu mengecewakan mu, tapi aku selalu berusaha ngasih ya terbaik buat kamu dan berusaha ngga ngebuat kamu kecewa. aku bener bener sayang sama kamu dan terimakasih buat semuanya. hari ini adalah hari nya linda dan linda mulai memasuki umur yang bisa dibilang cukup rumit, aku pasti selalu ngedoain kamu kok, aku tetep disini selalu bantu kamu kapan pun. make a wish yaa buat usia sekarang dan semoga bisa menjadi yang lebih baik dari sebelumnya, panjang umur dan sehat selalu yaa linda, i lovee uu.";
  
  let karakterKe = 0;
  let animasiAktif = false;

  function mulaiNgetik() {
    const wadah = document.getElementById("typing-memory");
    if (wadah && karakterKe < pesanLengkap.length) {
      wadah.innerHTML += pesanLengkap.charAt(karakterKe);
      karakterKe++;
      setTimeout(mulaiNgetik, 40); 
    }
  }

  // Cara yang lebih pasti untuk mendeteksi klik tombol Next di halaman Birthday
  document.addEventListener('click', function (e) {
    if (e.target && e.target.getAttribute('onclick') && e.target.getAttribute('onclick').includes('memoryPage')) {
      if (!animasiAktif) {
        const wadah = document.getElementById("typing-memory");
        if (wadah) wadah.innerHTML = ""; 
        setTimeout(mulaiNgetik, 1000); 
        animasiAktif = true;
      }
    }
  });
    </script>
  </body>
</html>
